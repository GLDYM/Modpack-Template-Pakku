name: Auto Validate, Build & Test

on:
  workflow_dispatch:
    ~
  push:
    branches: [master]
    paths:
      - "pakku.json"
      - "pakku-lock.json"
      - ".pakku/**"
  pull_request:
    branches: [master]
    paths:
      - "pakku.json"
      - "pakku-lock.json"
      - ".pakku/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  json-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: json-validate
        id: json-validate
        uses: GrantBirki/json-yaml-validate@v4.0.0
        with:
          comment: "true"
          base_dir: ".pakku"
          exclude_file: "exclude.txt"

  build-release:
    runs-on: ubuntu-latest
    needs: [json-validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: meta
        run: |
          python3 ./.github/scripts/resolve-build-meta.py pakku.json pakku-lock.json installer/install-config.properties >> "$GITHUB_OUTPUT"

      - name: Setup JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Client
        run: |
          wget "${{ steps.meta.outputs.pakku_url }}" -O pakku.jar >/dev/null 2>&1
          chmod 755 pakku.jar
          java -jar pakku.jar export

          mv ./build/curseforge/*.zip "./${{ steps.meta.outputs.client_zip }}"

      - name: Build and package server
        run: |
          chmod +x ./installer/install-server.sh
          chmod +x ./.github/scripts/package-server.sh
          ./.github/scripts/package-server.sh "${{ steps.meta.outputs.server_zip }}" "${{ steps.meta.outputs.full_server_zip }}"

      - name: Prepare build tag
        run: |
          chmod +x ./.github/scripts/prepare-release.sh
          ./.github/scripts/prepare-release.sh "build"

      - name: Ensure build release exists
        run: |
          if ! gh release view build >/dev/null 2>&1; then
            gh release create build --title "Build Release" --notes "Automated release for build tag"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build assets to release
        run: |
          gh release upload build \
            "${{ steps.meta.outputs.client_zip }}" \
            "${{ steps.meta.outputs.server_zip }}" \
            "${{ steps.meta.outputs.full_server_zip }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  startup-test:
    runs-on: ubuntu-latest
    needs: [json-validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: meta
        run: |
          python3 ./.github/scripts/resolve-build-meta.py pakku.json pakku-lock.json installer/install-config.properties >> "$GITHUB_OUTPUT"

      - name: Setup JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '${{ steps.meta.outputs.java_version }}'
          distribution: 'temurin'

      - name: Build server for test
        run: |
          chmod +x ./installer/install-server.sh
          ./installer/install-server.sh

      - name: Setup client test dependencies
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.x'

      - name: Install client runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb libxtst6 libxi6

          PORTABLEMC_VERSION="5.0.3"
          PORTABLEMC_URL="https://github.com/theorzr/portablemc/releases/download/v${PORTABLEMC_VERSION}/portablemc-${PORTABLEMC_VERSION}-linux-x86_64-gnu.tar.gz"

          mkdir -p "$HOME/.local/bin" /tmp/portablemc
          curl -fsSL "$PORTABLEMC_URL" -o /tmp/portablemc/portablemc.tar.gz
          tar -xzf /tmp/portablemc/portablemc.tar.gz -C /tmp/portablemc

          PORTABLEMC_BIN="$(find /tmp/portablemc -maxdepth 3 -type f -perm -111 -name 'portablemc*' | head -n 1)"
          if [[ -z "$PORTABLEMC_BIN" ]]; then
            echo "portablemc executable not found in release archive"
            exit 1
          fi

          install -m 755 "$PORTABLEMC_BIN" "$HOME/.local/bin/portablemc"
          "$HOME/.local/bin/portablemc" --help >/dev/null

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Start Xvfb
        run: |
          export DISPLAY=:1
          echo "DISPLAY=:1" >> "$GITHUB_ENV"
          sudo Xvfb -ac :1 -screen 0 854x480x24 > /dev/null 2>&1 &

      - name: Prepare client files and mods
        run: |
          chmod +x ./.github/scripts/prepare-client-mods.sh
          ./.github/scripts/prepare-client-mods.sh "pakku-lock.json" "pakku.json" "client" ".pakku"

      - name: Run Minecraft client and validate server connection
        run: |
          chmod +x ./.github/scripts/test-client-connect.sh
          ./.github/scripts/test-client-connect.sh
