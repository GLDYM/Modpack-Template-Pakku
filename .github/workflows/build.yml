name: Auto Validate, Build & Test

on:
  workflow_dispatch:
    ~
  push:
    branches: [master]
    paths:
      - "pakku.json"
      - "pakku-lock.json"
      - ".pakku/**"
  pull_request:
    branches: [master]
    paths:
      - "pakku.json"
      - "pakku-lock.json"
      - ".pakku/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  json-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: json-validate
        id: json-validate
        uses: GrantBirki/json-yaml-validate@v4.0.0
        with:
          comment: "true"
          base_dir: ".pakku"
          exclude_file: "exclude.txt"

  create-tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/build" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if missing
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag build
          git push origin build

      - name: Check if release exists
        id: check_release
        run: |
          release=$(gh release view build --json tagName -q .tagName || echo "none")
          if [ "$release" = "build" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release if missing
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create build --title "Build Release" --notes "Automated release for build tag"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: meta
        run: |
          chmod +x ./.github/scripts/resolve-build-meta.sh
          ./.github/scripts/resolve-build-meta.sh

      - name: Setup JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Client
        run: |
          wget "${{ steps.meta.outputs.pakku_url }}" -O pakku.jar >/dev/null 2>&1
          chmod 755 pakku.jar
          java -jar pakku.jar export

          mv ./build/curseforge/*.zip "./${{ steps.meta.outputs.client_zip }}"

      - name: Build and package server
        run: |
          chmod +x ./installer/install-server.sh
          chmod +x ./.github/scripts/package-server.sh
          ./.github/scripts/package-server.sh "${{ steps.meta.outputs.server_zip }}" "${{ steps.meta.outputs.full_server_zip }}"

      - name: Upload build assets to release
        run: |
          gh release upload build \
            "${{ steps.meta.outputs.client_zip }}" \
            "${{ steps.meta.outputs.server_zip }}" \
            "${{ steps.meta.outputs.full_server_zip }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  server-startup-test:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: meta
        run: |
          chmod +x ./.github/scripts/resolve-build-meta.sh
          ./.github/scripts/resolve-build-meta.sh

      - name: Setup JDK
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '${{ steps.meta.outputs.java_version }}'
          distribution: 'temurin'

      - name: Build server for test
        run: |
          chmod +x ./installer/install-server.sh
          ./installer/install-server.sh

      - name: Run Minecraft server and validate startup
        run: |
          chmod +x ./.github/scripts/test-server.sh
          ./.github/scripts/test-server.sh
